services:
  db:
    image: postgres:16-alpine
    container_name: emsi_db
    environment:
      POSTGRES_USER: emsi_user
      POSTGRES_PASSWORD: emsi_pass
      POSTGRES_DB: emsi_portail
    ports:
      - "5433:5432"
    volumes:
      - emsi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emsi_user -d emsi_portail"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: emsi_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emsi_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://emsi_user:emsi_pass@db:5432/emsi_portail
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production-very-long-secret
      FRONTEND_ORIGIN: http://localhost:3000
      ENVIRONMENT: development
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - emsi_pdf:/tmp/emsi_pdf

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: emsi_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_MOCK_MODE: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./hooks:/app/hooks
      - ./public:/app/public
      - ./styles:/app/styles

volumes:
  emsi_pgdata:
  emsi_pdf: